name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore FinanceApp.sln

    - name: Build Solution
      run: dotnet build FinanceApp.sln --configuration Release --no-restore

    - name: Run Unit Tests
      run: dotnet test FinanceApp.sln --configuration Release --no-build --verbosity normal
